---
openapi: 3.0.1
info:
  title: Prompt Protect API
  version: v1
  description: |
    Prompt Protect is a drop-in safety proxy for LLM calls.

    It sits between your backend and an LLM provider to detect PII, assess risk,
    and enforce policy before the prompt leaves your infrastructure.

    **Pipeline:** detect → assess risk → apply policy → (optionally mask) → forward
servers:
- url: http://localhost:3000
  description: Local (Docker)
paths:
  "/v1/chat/completions":
    post:
      summary: Send a prompt through Prompt Protect
      tags:
      - Proxy
      description: |
        Drop-in replacement for the OpenAI `/v1/chat/completions` endpoint.

        Prompt Protect inspects each message, computes a risk level, and applies policy before forwarding.

        ### Use cases

        **Allow** (risk: `low`) — prompt contains no sensitive data.
        Forwarded to OpenAI unchanged. Example: `"What is the capital of France?"`

        **Sanitize** (risk: `medium`) — prompt contains PII (email, phone, or address).
        Sensitive values are replaced with placeholders before forwarding. The original values never reach OpenAI.
        Example: `"Email john@example.com"` → forwarded as `"Email [EMAIL_1]"`

        **Block** (risk: `high`) — prompt contains an ID number (SSN, credit card) or multiple sensitive types.
        Request is rejected immediately — OpenAI is never called.
        Example: `"My SSN is 123-45-6789"`

        ### Risk rules

        | Risk | Triggers |
        |---|---|
        | `high` | Any ID number, or 2+ sensitive types detected |
        | `medium` | One sensitive type (email, phone, or address) |
        | `low` | Person name only, or no findings |

        ### Transparency headers

        Every response includes:

        | Header | Description |
        |---|---|
        | `X-Prompt-Protect-Risk-Level` | `low` / `medium` / `high` |
        | `X-Prompt-Protect-Action` | `allow` / `sanitize` / `block` |
        | `X-Prompt-Protect-Detected-Types` | Comma-separated PII types found (e.g. `email,person`) |
        | `X-Prompt-Protect-Masked` | `true` if content was masked before forwarding |
      parameters: []
      responses:
        '200':
          description: 'Allowed — clean content forwarded to OpenAI as-is (risk: low,
            action: allow)'
          headers:
            X-Prompt-Protect-Risk-Level:
              schema:
                type: string
                example: low
              description: Computed risk level
            X-Prompt-Protect-Action:
              schema:
                type: string
                example: allow
              description: Policy action taken
            X-Prompt-Protect-Detected-Types:
              schema:
                type: string
                example: ''
              description: Empty — no PII detected
            X-Prompt-Protect-Masked:
              schema:
                type: string
                example: 'false'
              description: Content was not masked
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    example: chatcmpl-abc123
                  object:
                    type: string
                    example: chat.completion
                  choices:
                    type: array
                    items:
                      type: object
                      properties:
                        message:
                          type: object
                          properties:
                            role:
                              type: string
                              example: assistant
                            content:
                              type: string
                              example: The capital of France is Paris.
        '422':
          description: 'Blocked — high-risk content detected, OpenAI never called
            (risk: high, action: block)'
          headers:
            X-Prompt-Protect-Risk-Level:
              schema:
                type: string
                example: high
              description: Computed risk level
            X-Prompt-Protect-Action:
              schema:
                type: string
                example: block
              description: Policy action taken
            X-Prompt-Protect-Detected-Types:
              schema:
                type: string
                example: id
              description: Detected PII types
            X-Prompt-Protect-Masked:
              schema:
                type: string
                example: 'false'
              description: Always false — request was not forwarded
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      type:
                        type: string
                        example: blocked
                      message:
                        type: string
                        example: 'Request blocked: high risk content detected'
                      risk_level:
                        type: string
                        example: high
        '502':
          description: Upstream error — OpenAI returned an error or could not be reached
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      type:
                        type: string
                        example: upstream_error
                      message:
                        type: string
                        example: Upstream returned 500
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - model
              - messages
              properties:
                model:
                  type: string
                  example: gpt-4o
                  description: The LLM model to use
                messages:
                  type: array
                  description: Conversation messages (OpenAI format)
                  items:
                    type: object
                    required:
                    - role
                    - content
                    properties:
                      role:
                        type: string
                        enum:
                        - system
                        - user
                        - assistant
                      content:
                        type: string
              example:
                model: gpt-4o
                messages:
                - role: user
                  content: What is the capital of France?
        required: true
  "/health":
    get:
      summary: Health check
      tags:
      - System
      description: Returns 200 if the service is up. Safe to use as a liveness probe.
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  service:
                    type: string
                    example: prompt-protect
